# Copy to .github/workflows/k6-ci.yml. Pin @main to a SHA; Renovate keeps it updated.
# See grafana/k6-ci/README.md for details.
name: k6 CI
on:
  pull_request:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: grafana/k6-ci/.github/workflows/all.yml@main # replace with a pinned SHA
    with:
      # Set to true if this repo is not an xk6 extension (library, k6 itself, etc.).
      skip-extension-testing: false
      # Set to true to skip multi-version Go tests (e.g. when this repo has its own test pipeline).
      # skip-tests: false
      # Pin to the same SHA as the `uses:` line above for a fully reproducible lint config.
      # k6-ci-ref: <sha>
