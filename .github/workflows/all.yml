# This workflow contains the most common jobs that are used in the CI of the k6's extensions.
# We created it to maintain the same standards that has the k6's core.
name: Extension Check
on:
  # actually makes this workflow re-usable
  workflow_call:
    inputs:
      skip-extension-testing:
        required: false
        default: false
        type: boolean
      skip-tests:
        required: false
        default: false
        type: boolean
      k6-ci-ref:
        required: false
        default: main
        type: string
        description: >
          The ref of grafana/k6-ci to download .golangci.yml from. Defaults to
          `main`. Callers that pin this workflow to a SHA should pass the same
          SHA here to get a matching config.
  # Enable manually triggering this workflow via the API or web UI
  workflow_dispatch:
    inputs:
      skip-extension-testing:
        required: false
        default: false
        type: boolean
      skip-tests:
        required: false
        default: false
        type: boolean
      k6-ci-ref:
        required: false
        default: main
        type: string
  push:
    branches:
      - main
      - renovate/*
    tags:
      - v*
  pull_request:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.x
          cache: false # against cache-poisoning
          check-latest: true
      # Pinned to main rather than `./.github/actions/deps` because the
      # latter resolves to the caller's workspace under workflow_call —
      # not k6-ci's. PRs to k6-ci that modify this action need to be
      # exercised via workflow_dispatch or a downstream caller pinned to
      # the PR's SHA, not via all.yml's own PR checks.
      - uses: grafana/k6-ci/.github/actions/deps@main

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.x
          cache: false # against cache-poisoning
          check-latest: true
      - uses: grafana/k6-ci/.github/actions/lint@main
        with:
          ref: ${{ inputs.k6-ci-ref }}

  test-go-versions:
    if: ${{ !inputs.skip-tests }}
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25.x, 1.26.x, tip]
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Go ${{ matrix.go-version }}
        if: matrix.go-version != 'tip'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: false # against cache-poisoning
          check-latest: true
      - name: Download Go tip
        if: matrix.go-version == 'tip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ matrix.platform }} --repo grafana/gotip --pattern 'go.zip'
      - name: Install Go tip
        if: matrix.go-version == 'tip'
        run: |
          unzip go.zip -d $HOME/sdk
          echo "GOROOT=$HOME/sdk/gotip" >> "$GITHUB_ENV"
          echo "GOPATH=$HOME/go" >> "$GITHUB_ENV"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          echo "$HOME/sdk/gotip/bin" >> "$GITHUB_PATH"
      - name: Run tests
        run: |
          which go
          go version
          go test -race -timeout 800s ./...

  extension-build-testing:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-extension-testing }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.x
          cache: false # against cache-poisoning
          check-latest: true
      - name: Check build
        run: |
          go version
          pwd && ls -l

          go install go.k6.io/xk6/cmd/xk6@master
          MODULE_NAME=`go list -m`

          GOPRIVATE="go.k6.io/k6" xk6 build \
            --output ./k6ext \
            --with $MODULE_NAME="."
          ./k6ext version
