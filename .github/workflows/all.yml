# This workflow contains the most common jobs that are used in the CI of the k6's extensions.
# We created it to maintain the same standards that has the k6's core.
name: Extension Check
on:
  # actually makes this workflow re-usable
  workflow_call:
    inputs:
      skip-extension-testing:
        required: false
        default: false
        type: boolean
      skip-tests:
        required: false
        default: false
        type: boolean
      k6-ci-ref:
        required: false
        default: main
        type: string
        description: >
          The ref of grafana/k6-ci to download .golangci.yml from. Defaults to
          `main`. Callers that pin this workflow to a SHA should pass the same
          SHA here to get a matching config.
  # Enable manually triggering this workflow via the API or web UI
  workflow_dispatch:
    inputs:
      skip-extension-testing:
        required: false
        default: false
        type: boolean
      skip-tests:
        required: false
        default: false
        type: boolean
      k6-ci-ref:
        required: false
        default: main
        type: string
  push:
    branches:
      - main
      - renovate/*
    tags:
      - v*
  pull_request:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: 1.26.x
          cache: false # against cache-poisoning
          check-latest: true
      - name: Check dependencies
        run: |
          go version
          test -z "$(go mod tidy  && git status --porcelain)"
          go mod verify

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: 1.26.x
          check-latest: true
      - name: Build golangci config
        env:
          # Empty for non-workflow_call triggers (push, pull_request, etc.).
          # When empty we treat this as k6-ci's own CI and use the in-tree
          # .golangci.yml from the checkout. When set, an external caller is
          # invoking us via workflow_call and we curl the config at their
          # pinned ref.
          K6_CI_REF: ${{ inputs.k6-ci-ref }}
        run: |
          cfg_dir="${GITHUB_WORKSPACE}/.k6-ci-lint"
          cfg="${cfg_dir}/.golangci.yml"
          mkdir -p "${cfg_dir}"

          if [ -n "${K6_CI_REF}" ]; then
            rules_url="https://raw.githubusercontent.com/grafana/k6-ci/${K6_CI_REF}/.golangci.yml"
            echo "Downloading '${rules_url}' ..."
            curl --silent --show-error --fail --no-location "${rules_url}" --output "${cfg}"
          else
            echo "Using in-tree .golangci.yml (k6-ci self-CI)"
            cp "${GITHUB_WORKSPACE}/.golangci.yml" "${cfg}"
          fi

          patch_file="${GITHUB_WORKSPACE}/.golangci.patch"
          if [ -f "${patch_file}" ]; then
            echo "Applying '${patch_file}' ..."
            git -C "${GITHUB_WORKSPACE}" apply --directory=.k6-ci-lint "${patch_file}"
          fi

          echo "version=$(head -n 1 "${cfg}" | tr -d '# ')" >> "${GITHUB_OUTPUT}"
          echo "config=${cfg}" >> "${GITHUB_OUTPUT}"
        id: cfg
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ steps.cfg.outputs.version }}
          args: "--config=${{ steps.cfg.outputs.config }}"

  test-go-versions:
    if: ${{ !inputs.skip-tests }}
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25.x, 1.26.x, tip]
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - name: Install Go ${{ matrix.go-version }}
        if: matrix.go-version != 'tip'
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: false # against cache-poisoning
          check-latest: true
      - name: Download Go tip
        if: matrix.go-version == 'tip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ matrix.platform }} --repo grafana/gotip --pattern 'go.zip'
      - name: Install Go tip
        if: matrix.go-version == 'tip'
        run: |
          unzip go.zip -d $HOME/sdk
          echo "GOROOT=$HOME/sdk/gotip" >> "$GITHUB_ENV"
          echo "GOPATH=$HOME/go" >> "$GITHUB_ENV"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          echo "$HOME/sdk/gotip/bin" >> "$GITHUB_PATH"
      - name: Run tests
        run: |
          which go
          go version
          go test -race -timeout 800s ./...

  extension-build-testing:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-extension-testing }}
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - name: Install Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: 1.26.x
          cache: false # against cache-poisoning
          check-latest: true
      - name: Check build
        run: |
          go version
          pwd && ls -l

          go install go.k6.io/xk6/cmd/xk6@master
          MODULE_NAME=`go list -m`

          GOPRIVATE="go.k6.io/k6" xk6 build \
            --output ./k6ext \
            --with $MODULE_NAME="."
          ./k6ext version
